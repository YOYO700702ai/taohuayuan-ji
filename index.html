<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>桃花源記・尋源之路</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260616-mobile">
</head>
<body>
  <div id="rotateHint" class="rotate-hint" role="button" tabindex="0" aria-label="旋轉手機以獲得更大畫面，點擊關閉提示">
    <div class="rotate-hint-inner">
      <div class="rotate-icon">⟳</div>
      <p class="rotate-title">建議橫向握持手機</p>
      <p class="rotate-sub">畫面會更大、更清楚<br>（也可直接點此繼續）</p>
    </div>
  </div>
  <main class="page-shell">
    <section id="game" class="game-shell" aria-label="桃花源記尋源之路互動遊戲">
      <div class="backdrop" aria-hidden="true">
        <img id="sceneImage" class="scene-image" alt="">
      </div>
      <div class="paper-noise" aria-hidden="true"></div>
      <div id="petalLayer" class="petal-layer" aria-hidden="true"></div>

      <audio id="bgMusic" src="背景音樂.mp3" loop preload="auto"></audio>
      <button id="musicToggle" class="music-toggle" type="button" aria-pressed="true" aria-label="關閉背景音樂">♪ 音樂</button>

      <section id="titleScreen" class="screen title-screen" role="button" tabindex="0" aria-label="點擊任何位置開始遊戲">
        <img class="cover-image" src="assets/cover.png?v=20260601-village" alt="陶淵明.桃花源記，點擊任何位置開始遊戲">
      </section>

      <section id="villageLayer" class="village-layer" aria-label="桃花村探索熱點" hidden></section>
      <section id="playLayer" class="play-layer" aria-label="字詞排序區"></section>

      <aside id="puzzlePanel" class="puzzle-panel" aria-label="答題框" hidden>
        <div id="answerTrack" class="answer-track"></div>
        <button id="resetButton" class="reset-button" type="button">重排</button>
      </aside>

      <section id="dialogueLayer" class="dialogue-layer" aria-label="桃花村對話" hidden>
        <div class="dialogue-card">
          <div class="dialogue-portrait">
            <img id="dialogueImage" alt="">
          </div>
          <div class="dialogue-content">
            <div id="dialogueName" class="dialogue-name"></div>
            <p id="dialogueText" class="dialogue-text"></p>
            <div id="dialogueOptions" class="dialogue-options"></div>
          </div>
        </div>
      </section>

      <div id="messageToast" class="message-toast" role="status" aria-live="polite"></div>

      <section id="explainLayer" class="screen explain-screen" hidden>
        <img id="explainImage" class="explain-image" alt="">
        <div class="explain-copy">
          <p id="explainText"></p>
        </div>
      </section>

      <section id="endingScreen" class="screen ending-screen" role="button" tabindex="0" aria-label="點擊進入桃花村" hidden></section>
    </section>
  </main>

  <script src="script.js?v=20260616-mobile"></script>
</body>
</html>
